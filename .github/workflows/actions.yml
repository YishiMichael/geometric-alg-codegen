name: actions

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  codegen-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: cargo build --manifest-path codegen/Cargo.toml
  codegen-fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: cargo fmt --manifest-path codegen/Cargo.toml -- --check
    - run: cargo clippy --manifest-path codegen/Cargo.toml --all-targets
  codegen:
    runs-on: ubuntu-latest
    needs: codegen-build
    steps:
    - uses: actions/checkout@v6
    - run: chmod +x scripts/generate.sh
    - run: ./generate.sh
  lib-rust:
    runs-on: ubuntu-latest
    needs: codegen
    steps:
    - uses: actions/checkout@v6
    - run: cargo build --manifest-path geometric-alg/Cargo.toml --all-targets
  lib-wgsl:
    runs-on: ubuntu-latest
    needs: codegen
    steps:
    - uses: actions/checkout@v6
    - run: cargo install naga-cli
    - run: |
        for f in $(find ./geometric-alg/src/generated/wgsl -name "*.wgsl"); do
          naga "$f"
        done
  lib-glsl:
    runs-on: ubuntu-latest
    needs: codegen
    steps:
    - uses: actions/checkout@v6
    - run: sudo apt-get install -y glslang-tools
    - run: |
        for f in $(find ./geometric-alg/src/generated/glsl -name "*.glsl"); do
          glslangValidator -S vert "$f"
        done
